<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parabéns</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="back"></div>
        <div class="front">
            <div class="hover-text">Passe o cursor do mouse para abrir</div>
            <div class="cover-shape-large">
                <div class="shape-diamond"></div>
                <div class="shape-block"></div>
            </div>
            <div class="cover-shape-small">
                <div class="shape-diamond"></div>
                <div class="shape-block">
                    <div class="cake">
                        <div class="layer layer-bottom"></div>
                        <div class="Layer layer-middle"></div>
                        <div class="layer layer-top"></div>
                        <div class="icing"></div>
                        <div class="drip drip1"></div>
                        <div class="drip drip2"></div>
                        <div class="drip drip3"></div>
                        <div class="candle">
                            <div class="flame"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="text-container">
            <p id="head"><br>Feliz Aniversário Perprecta!</p>
            <div>Parabéns. <br> 
                Muitas felicidades, saúde e sucesso! <br>
                Que seu dia seja incrível!
            </div>
            <p>Aproveite! Muita benção e $$$</p>
            <br>
            <p>Jean e Márcio - 26-04-2026</p>
        </div>
    </div>
</body>

</html>
